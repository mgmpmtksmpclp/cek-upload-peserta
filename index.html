<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sekolah Sudah Upload Peserta</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .table-container { height: calc(100vh - 400px); overflow-y: auto; }
        /* Memastikan font konsisten di seluruh sel tabel */
        td, th { font-size: 0.875rem !important; } /* Equivalent to text-sm */
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-gray-100">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <i data-lucide="upload-cloud" class="text-blue-600"></i>
                        Data Sekolah Sudah Upload Peserta
                    </h1>
                    <p class="text-gray-500 text-sm mt-1 text-blue-600 font-medium">Rekapitulasi otomatis berdasarkan data Kolom G</p>
                </div>
                
                <!-- Filter Section -->
                <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                    <!-- Filter Komda -->
                    <div class="relative w-full sm:w-48">
                        <select id="komdaFilter" class="block w-full pl-3 pr-10 py-2 text-sm border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none">
                            <option value="">Semua Komda</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i data-lucide="chevron-down" class="h-4 w-4 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Filter NPSN / Status -->
                    <div class="relative w-full sm:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="h-4 w-4 text-gray-400"></i>
                        </div>
                        <input type="text" id="keywordFilter" 
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" 
                            placeholder="Cari NPSN atau Status...">
                    </div>
                </div>
            </div>
        </div>

        <!-- Rekapitulasi Section -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center gap-3">
                <div class="p-2 bg-blue-100 rounded-lg text-blue-600">
                    <i data-lucide="database" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-medium uppercase tracking-wider">Total Tampil</p>
                    <p id="totalSekolahCount" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center gap-3">
                <div class="p-2 bg-green-100 rounded-lg text-green-600">
                    <i data-lucide="user-check" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-medium uppercase tracking-wider">Mandiri</p>
                    <p id="mandiriCount" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center gap-3">
                <div class="p-2 bg-orange-100 rounded-lg text-orange-600">
                    <i data-lucide="users" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-medium uppercase tracking-wider">Panitia</p>
                    <p id="panitiaCount" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center gap-3">
                <div class="p-2 bg-red-100 rounded-lg text-red-600">
                    <i data-lucide="x-circle" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-medium uppercase tracking-wider">Tidak Ikut</p>
                    <p id="tidakIkutCount" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="bg-white shadow-md rounded-xl overflow-hidden border border-gray-200">
            <div class="table-container">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-100 sticky top-0 z-10">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-600 uppercase tracking-wider">No</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-600 uppercase tracking-wider">Komda</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-600 uppercase tracking-wider">Sekolah</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-600 uppercase tracking-wider">NPSN</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-600 uppercase tracking-wider">Proses Upload</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center">
                                <div class="flex flex-col items-center justify-center space-y-3">
                                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                                    <p class="text-gray-500">Memuat data...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="noResult" class="hidden p-10 text-center text-gray-500 bg-gray-50">
                <i data-lucide="info" class="mx-auto h-12 w-12 text-gray-300 mb-4"></i>
                <p class="text-lg">Data tidak ditemukan.</p>
            </div>
        </div>
        
        <div class="mt-4 flex justify-between items-center text-xs text-gray-500">
            <p>Menampilkan <span id="displayedCount">0</span> sekolah berdasarkan filter</p>
            <p>&copy; 2026 Panitia TO TKA Kabupaten Cilacap</p>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyMk_UZA4OOyZ169-dnpv8PnYcP2d6kcQN5n-goNayNYN48ISvrFofTRSw6sKfmcWBkpbpCe0fuAh1/pub?output=csv';
        let allData = [];

        async function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const rows = results.data.slice(1);
                    allData = rows.map((row, index) => ({
                        no: index + 1,
                        sekolah: row[0] || '-',
                        npsn: row[1] || '-',
                        komda: row[4] || '-',
                        // Kolom G (index 6) berisi "Mandiri", "Panitia", atau "Tidak Ikut"
                        status: (row[6] || '-').trim()
                    }));
                    
                    populateKomdaFilter(allData);
                    applyFilters(); 
                },
                error: function(err) {
                    console.error("Error fetching CSV:", err);
                    document.getElementById('tableBody').innerHTML = `
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-red-500">Gagal memuat data.</td>
                        </tr>
                    `;
                }
            });
        }

        function updateStats(filteredData) {
            const total = filteredData.length;
            const mandiri = filteredData.filter(item => item.status.toUpperCase() === 'MANDIRI').length;
            const panitia = filteredData.filter(item => item.status.toUpperCase() === 'PANITIA').length;
            const tidakIkut = filteredData.filter(item => item.status.toUpperCase() === 'TIDAK IKUT').length;

            document.getElementById('totalSekolahCount').innerText = total;
            document.getElementById('mandiriCount').innerText = mandiri;
            document.getElementById('panitiaCount').innerText = panitia;
            document.getElementById('tidakIkutCount').innerText = tidakIkut;
        }

        function populateKomdaFilter(data) {
            const komdaList = [...new Set(data.map(item => item.komda))].sort();
            const select = document.getElementById('komdaFilter');
            select.innerHTML = '<option value="">Semua Komda</option>';
            komdaList.forEach(komda => {
                if(komda && komda !== '-') {
                    const option = document.createElement('option');
                    option.value = komda;
                    option.textContent = komda;
                    select.appendChild(option);
                }
            });
        }

        function getStatusBadgeClass(status) {
            const s = status.toUpperCase();
            if (s === 'MANDIRI') return 'bg-green-100 text-green-700 border border-green-200';
            if (s === 'TIDAK IKUT') return 'bg-red-100 text-red-700 border border-red-200';
            if (s === 'PANITIA') return 'bg-orange-100 text-orange-700 border border-orange-200';
            return 'bg-gray-100 text-gray-700 border border-gray-200';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const noResult = document.getElementById('noResult');
            const displayedCount = document.getElementById('displayedCount');
            
            displayedCount.innerText = data.length;

            if (data.length === 0) {
                tbody.innerHTML = '';
                noResult.classList.remove('hidden');
                return;
            }

            noResult.classList.add('hidden');
            tbody.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-blue-50 transition-colors duration-150">
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600 font-medium">${index + 1}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-900">${item.komda}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-900 font-medium">${item.sekolah}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-700 font-mono">${item.npsn}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2.5 py-1 rounded-full text-[11px] font-bold uppercase tracking-tight ${getStatusBadgeClass(item.status)}">
                            ${item.status}
                        </span>
                    </td>
                </tr>
            `).join('');
            
            lucide.createIcons();
        }

        function applyFilters() {
            const keywordValue = document.getElementById('keywordFilter').value.toLowerCase();
            const komdaValue = document.getElementById('komdaFilter').value;

            const filtered = allData.filter(item => {
                const matchKeyword = item.npsn.toLowerCase().includes(keywordValue) || 
                                     item.status.toLowerCase().includes(keywordValue) ||
                                     item.sekolah.toLowerCase().includes(keywordValue);
                const matchKomda = komdaValue === "" || item.komda === komdaValue;
                return matchKeyword && matchKomda;
            });

            updateStats(filtered);
            renderTable(filtered);
        }

        document.getElementById('keywordFilter').addEventListener('input', applyFilters);
        document.getElementById('komdaFilter').addEventListener('change', applyFilters);

        window.onload = () => {
            fetchData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
